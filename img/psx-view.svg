<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect fill="#000008" width="1600" height="900"/>
  <!-- PSX dithered background effect -->
  <defs>
    <pattern id="dither" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="2" fill="#080818" opacity="0.3"/>
      <rect x="2" y="2" width="2" height="2" fill="#080818" opacity="0.3"/>
    </pattern>
  </defs>
  <rect fill="url(#dither)" width="1600" height="900"/>
  <!-- Floor with vertex coloring -->
  <polygon points="0,900 1600,900 1200,500 400,500" fill="#1a1a3a" opacity="0.8"/>
  <polygon points="0,900 400,500 200,500 0,700" fill="#151530" opacity="0.8"/>
  <polygon points="1600,900 1200,500 1400,500 1600,700" fill="#151530" opacity="0.8"/>
  <!-- Walls -->
  <polygon points="400,500 400,200 0,350 0,700" fill="#222250" opacity="0.9"/>
  <polygon points="1200,500 1200,200 1600,350 1600,700" fill="#222250" opacity="0.9"/>
  <!-- Back wall -->
  <rect x="400" y="200" width="800" height="300" fill="#2a2a5a" opacity="0.85"/>
  <!-- PSX vertex-color shading on walls -->
  <polygon points="400,200 600,200 500,350 400,350" fill="#1e1e48" opacity="0.4"/>
  <polygon points="800,200 1000,200 1000,350 800,350" fill="#2e2e58" opacity="0.3"/>
  <!-- Door -->
  <rect x="700" y="260" width="160" height="240" fill="#0a0a20" stroke="#3a3a6a" stroke-width="2"/>
  <rect x="845" y="385" width="8" height="8" fill="#aa8844" rx="4"/>
  <!-- Object/crate with PSX-style flat shading -->
  <g transform="translate(540, 380)">
    <polygon points="0,50 60,50 60,-10 0,-10" fill="#554422"/>
    <polygon points="0,-10 30,-30 90,-30 60,-10" fill="#776633"/>
    <polygon points="60,-10 90,-30 90,30 60,50" fill="#443311"/>
    <text fill="#665533" x="15" y="30" font-family="monospace" font-size="10">CRATE</text>
  </g>
  <!-- PSX character placeholder -->
  <g transform="translate(800, 480)">
    <rect x="-15" y="-60" width="30" height="30" fill="#aa6644"/>
    <rect x="-20" y="-30" width="40" height="40" fill="#5566aa"/>
    <rect x="-15" y="10" width="12" height="25" fill="#334488"/>
    <rect x="3" y="10" width="12" height="25" fill="#334488"/>
  </g>
  <!-- Lighting/atmosphere -->
  <radialGradient id="light1" cx="780" cy="260" r="300" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#ffcc66" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#ffcc66" stop-opacity="0"/>
  </radialGradient>
  <rect fill="url(#light1)" width="1600" height="900"/>
  <!-- PSX fog effect -->
  <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0a2a" stop-opacity="0.6"/>
    <stop offset="40%" stop-color="#0a0a2a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a2a" stop-opacity="0.4"/>
  </linearGradient>
  <rect fill="url(#fog)" width="1600" height="900"/>
  <!-- Scanline effect -->
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1600" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1600" height="2" fill="transparent"/>
      <rect x="0" y="2" width="1600" height="2" fill="#000000" opacity="0.08"/>
    </pattern>
  </defs>
  <rect fill="url(#scanlines)" width="1600" height="900"/>
  <!-- "PSX" watermark -->
  <text fill="#5a5a7a" x="800" y="850" font-family="monospace" font-size="16" text-anchor="middle" opacity="0.5">Replace with your PSX screenshot</text>
</svg>
